<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScoutMe | profile</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body data-page="profile">
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="dashboard.html">
        <img src="./assets/images/logo.png" alt="ScoutMe logo" />
        <span>ScoutMe</span>
      </a>
      <div class="topbar-actions">
        <span id="top-username" class="chip">@guest</span>
        <select id="global-language" class="lang-select"></select>
        <button id="logout-btn" class="ghost-btn" data-i18n="auth.logout">Logout</button>
      </div>
    </div>
  </header>

  <main class="container layout">
    <aside class="sidebar glass-card">
      <a class="brand" href="dashboard.html">
        <img src="./assets/images/logo.png" alt="ScoutMe logo" />
        <span>ScoutMe</span>
      </a>
      <nav class="sidebar-nav">
        <a href="dashboard.html" data-link="dashboard" data-i18n="nav.dashboard">Dashboard</a>
        <a href="profile.html" data-link="profile" data-i18n="nav.profile">Profile</a>
        <a href="ranking.html" data-link="ranking" data-i18n="nav.ranking">Ranking</a>
        <a href="transfer.html" data-link="transfer" data-i18n="nav.transfer">Transfers</a>
        <a href="chat.html" data-link="chat" data-i18n="nav.chat">Chat</a>
        <a href="hall.html" data-link="hall" data-i18n="nav.hall">Hall of Fame</a>
        <a href="metaverse.html" data-link="metaverse" data-i18n="nav.metaverse">Metaverse</a>
      </nav>
    </aside>

    <section class="main-shell">
      <div class="page-header">
        <div>
          <div class="eyebrow" id="page-eyebrow">ScoutMe</div>
          <h1 id="page-title">Athlete & Club Profile</h1>
          <p class="muted" id="page-description">Configure role, sport, stats, badges, media, and preferred language.</p>
        </div>
        <div class="inline-actions" id="page-actions"></div>
      </div>
      <div id="page-root"></div>
    </section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
